  .hero { background: #1a1a2e; color: #fff; padding: 28px 20px; }

  .nav-btn { padding: 13px 20px; font-size: 14px; font-weight: 400; color: #666; border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }

  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #e8f0fe; color: #1a56db; white-space: nowrap; flex-shrink: 0; }
  .badge.fin { background: #f0fdf4; color: #166534; }
  .card-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 8px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #f5f5f3; color: #666; border: 1px solid #e5e5e5; }
  .tag.match { background: #fef9c3; color: #854d0e; border-color: transparent; }

  .back-btn { font-size: 13px; color: #666; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 16px; display: flex; align-items: center; gap: 4px; }
  .back-btn:hover { color: #1a1a1a; }
  .detail-wrap { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 24px; }
  .detail-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: #f0fdf4; color: #166534; display: inline-block; margin-bottom: 10px; }

  .step-num { width: 26px; height: 26px; border-radius: 50%; background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 20px; }
  .cal-day-name { font-size: 11px; color: #999; text-align: center; padding: 4px 0; font-weight: 600; }
  .cal-day { min-height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #666; }
  .cal-day.other { color: #ddd; }
  .cal-day.has-event { background: #1a1a2e; color: #fff; font-weight: 700; cursor: pointer; }
  .event-item { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
  .event-date-badge { background: #1a1a2e; color: #fff; border-radius: 8px; padding: 8px 10px; text-align: center; font-size: 12px; font-weight: 700; min-width: 46px; line-height: 1.3; }
  .event-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .event-desc { font-size: 12px; color: #888; margin-top: 2px; }

  .empty-state { padding: 3rem 0; text-align: center; font-size: 14px; color: #bbb; }
  .hidden { display: none !important; }

  @media (max-width: 600px) {

function matches(t, q) {
  return t.title.toLowerCase().includes(q) ||
    t.desc.toLowerCase().includes(q) ||
    t.tags.some(tg => tg.toLowerCase().includes(q)) ||
    t.section.toLowerCase().includes(q);
}

function cardHtml(t, q) {
  const tags = t.tags.map(tg =>
    `<span class="tag ${q && tg.toLowerCase().includes(q) ? 'match' : ''}">${tg}</span>`
  ).join('');
  const badgeClass = t.section === 'Finanzas' ? 'fin' : '';
  return `<div class="card" onclick="showDetail(${t.id})">
    <div class="card-header">
      <span class="card-title">${t.title}</span>
      <span class="badge ${badgeClass}">${t.section}</span>
    </div>
    <div class="card-desc">${t.desc}</div>
    <div class="tags">${tags}</div>
  </div>`;
}

function renderTutorials(q) {
  q = (q || '').toLowerCase().trim();
  const list = document.getElementById('tutorialList');
  const label = document.getElementById('resultsLabel');
  const sins = TUTORIALES.filter(t => t.section === 'Siniestros' && (!q || matches(t, q)));
  const fins = TUTORIALES.filter(t => t.section === 'Finanzas' && (!q || matches(t, q)));
  const total = sins.length + fins.length;
  label.textContent = q ? `${total} resultado${total !== 1 ? 's' : ''} para "${q}"` : 'Todos los tutoriales';
  let html = '';
  if (fins.length) {
    html += `<div class="section-title">Finanzas</div>`;
    if (!q) html += `<div class="section-desc">Tutoriales para el orden financiero de nuestros clientes y la salud de nuestra cartera.</div>`;
    fins.forEach(t => html += cardHtml(t, q));
  }
  if (sins.length) {
    html += `<div class="section-title">Siniestros</div>`;
    sins.forEach(t => html += cardHtml(t, q));
  }
  if (!total) html = '<div class="empty-state">No se encontraron tutoriales para esa búsqueda.</div>';
  list.innerHTML = html;
}

function showDetail(id) {
  const t = TUTORIALES.find(x => x.id === id);
  if (!t) return;
  document.getElementById('detailContent').innerHTML = t.renderDetail();
  document.getElementById('sec-tutoriales').classList.add('hidden');
  document.getElementById('sec-detail').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function backToList() {
  document.getElementById('sec-detail').classList.add('hidden');
  document.getElementById('sec-tutoriales').classList.remove('hidden');
}

function showSection(s) {
  ['tutoriales', 'detail', 'novedades', 'calendario'].forEach(x => {
    document.getElementById('sec-' + x).classList.add('hidden');
  });
  document.getElementById('sec-' + s).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['tutoriales', 'novedades', 'calendario'][i] === s);
  });
  if (s === 'novedades') renderNovedades();
  if (s === 'calendario') renderCalendario();
  window.scrollTo(0, 0);
}

function renderNovedades() {
  let html = '<div class="section-title">Novedades del mes</div>';
  NOVEDADES.forEach(n => {
    html += `<div class="novedad-card">
      <div class="novedad-date">${n.fecha}</div>
      <div class="novedad-title">${n.titulo}</div>
      <div class="novedad-body">${n.cuerpo}</div>`;
    if (n.requisitos && n.requisitos.length) {
      html += `<ul class="novedad-reqs">${n.requisitos.map(r => `<li>${r}</li>`).join('')}</ul>`;
    }
    if (n.extra) html += `<div class="novedad-body" style="margin-top:10px">${n.extra}</div>`;
    html += `</div>`;
  });
  document.getElementById('novedadesList').innerHTML = html;
}

function renderCalendario() {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  if (!EVENTOS.length) {
    document.getElementById('calendarioContent').innerHTML = '<div class="empty-state">No hay eventos cargados.</div>';
    return;
  }
  const ref = EVENTOS[0];
  const anio = ref.anio, mes = ref.mes;
  const firstDay = new Date(anio, mes, 1).getDay();
  const daysInMonth = new Date(anio, mes + 1, 0).getDate();
  const eventDias = EVENTOS.map(e => e.dia);
  let html = `<div class="cal-month">${meses[mes]} ${anio}</div><div class="cal-grid">`;
  html += dias.map(d => `<div class="cal-day-name">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day other"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    html += `<div class="cal-day${eventDias.includes(d) ? ' has-event' : ''}">${d}</div>`;
  }
  html += `</div><div class="section-title">Eventos del mes</div>`;
  EVENTOS.forEach(e => {
    html += `<div class="event-item">
      <div class="event-date-badge">${e.dia}<br>${meses[e.mes].substring(0,3).toUpperCase()}</div>
      <div><div class="event-title">${e.titulo}</div><div class="event-desc">${e.desc}</div></div>
    </div>`;
  });
  document.getElementById('calendarioContent').innerHTML = html;
}

renderTutorials('');
</script>
</body>
</html>
