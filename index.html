function matches(t, q) {
  return t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) ||
    t.tags.some(tg => tg.toLowerCase().includes(q)) || t.section.toLowerCase().includes(q);
}

function cardHtml(t, q) {
  const isFin = t.section === 'Finanzas';
  const tags = t.tags.map(tg => `<span class="tcard-tag ${q && tg.toLowerCase().includes(q) ? 'match' : ''}">${tg}</span>`).join('');
  return `<div class="tcard" onclick="showDetail(${t.id})">
    <div class="tcard-top">
      <div class="tcard-icon ${isFin?'fin':'sin'}">${t.icon}</div>
      <div class="tcard-info">
        <div class="tcard-title">${t.title}</div>
        <span class="tcard-badge ${isFin?'fin':'sin'}">${t.section}</span>
      </div>
    </div>
    <div class="tcard-desc">${t.desc}</div>
    <div class="tcard-tags">${tags}</div>
  </div>`;
}

function renderTutorials(q) {
  q = (q||'').toLowerCase().trim();
  const fins = TUTORIALES.filter(t => t.section==='Finanzas' && (!q||matches(t,q)));
  const sins = TUTORIALES.filter(t => t.section==='Siniestros' && (!q||matches(t,q)));
  const total = fins.length + sins.length;
  document.getElementById('resultsLabel').textContent = q ? `${total} resultado${total!==1?'s':''} para "${q}"` : '';
  let html = '';
  if (fins.length) {
    html += `<div class="sec-header"><div class="sec-header-icon fin">💰</div><div class="sec-header-text"><h3>Finanzas</h3>${!q?'<p>Orden financiero y salud de la cartera</p>':''}</div></div>`;

  }
  if (sins.length) {
    html += `<div class="sec-header"><div class="sec-header-icon sin">🚨</div><div class="sec-header-text"><h3>Siniestros</h3>${!q?'<p>Toda la información que necesitás sobre la gestión de siniestros.</p>':''}</div></div>`;
    html += `<div class="card-grid">${sins.map(t=>cardHtml(t,q)).join('')}</div>`;
    html += MAURICIO_BANNER;
    html += HORACIO_BANNER;
  }
  if (!total) html = '<div class="empty-state">No se encontraron tutoriales para esa búsqueda.</div>';
  document.getElementById('tutorialList').innerHTML = html;
}

function showDetail(id) {
  const t = TUTORIALES.find(x => x.id===id);
  if (!t) return;
  document.getElementById('detailContent').innerHTML = t.renderDetail();
  document.getElementById('sec-tutoriales').classList.add('hidden');
  document.getElementById('sec-detail').classList.remove('hidden');
  window.scrollTo(0,0);
}

function backToList() {
  document.getElementById('sec-detail').classList.add('hidden');
  document.getElementById('sec-tutoriales').classList.remove('hidden');
}

function showSection(s) {
  ['tutoriales','detail','novedades','calendario'].forEach(x => document.getElementById('sec-'+x).classList.add('hidden'));
  document.getElementById('sec-'+s).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', ['tutoriales','novedades','calendario'][i]===s));
  if (s==='novedades') renderNovedades();
  if (s==='calendario') renderCalendario();
  window.scrollTo(0,0);
}

function renderNovedades() {
  let html = '';
  NOVEDADES.forEach(n => {
    html += `<div class="novedad-card"><div class="novedad-date">${n.fecha}</div><div class="novedad-title">${n.titulo}</div><div class="novedad-body">${n.cuerpo}</div>`;
    if (n.requisitos?.length) html += `<ul class="novedad-reqs">${n.requisitos.map(r=>`<li>${r}</li>`).join('')}</ul>`;
    if (n.extra) html += `<div class="novedad-body" style="margin-top:10px">${n.extra}</div>`;
    html += `</div>`;
  });
  document.getElementById('novedadesList').innerHTML = html;
}

function renderCalendario() {
  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  if (!EVENTOS.length) { document.getElementById('calendarioContent').innerHTML='<div class="empty-state">No hay eventos cargados.</div>'; return; }
  const ref = EVENTOS[0];
  const firstDay = new Date(ref.anio,ref.mes,1).getDay();
  const daysInMonth = new Date(ref.anio,ref.mes+1,0).getDate();
  const eventDias = EVENTOS.map(e=>e.dia);
  let html = `<div class="cal-header"><div class="cal-month-badge">${meses[ref.mes]} ${ref.anio}</div></div>`;
  html += `<div class="cal-grid">${dias.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;
  for (let i=0;i<firstDay;i++) html+=`<div class="cal-day other"></div>`;
  for (let d=1;d<=daysInMonth;d++) html+=`<div class="cal-day${eventDias.includes(d)?' has-event':''}">${d}</div>`;
  html += `</div><div class="sec-header"><div class="sec-header-icon fin">📅</div><div class="sec-header-text"><h3>Eventos del mes</h3></div></div>`;
  EVENTOS.forEach(e => {
    html += `<div class="event-item"><div class="event-date-badge">${e.dia}<br>${meses[e.mes].substring(0,3).toUpperCase()}</div><div><div class="event-title">${e.titulo}</div><div class="event-desc">${e.desc}</div></div></div>`;
  });
  document.getElementById('calendarioContent').innerHTML = html;
}

renderTutorials('');
</script>
